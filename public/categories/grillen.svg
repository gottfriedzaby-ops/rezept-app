<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Grillen">
  <defs>
    <linearGradient id="bg-grillen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1E0D4"/>
      <stop offset="1" stop-color="#E4C2A8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg-grillen)"/>

  <!-- subtle background flourish (may crop) -->
  <circle cx="200" cy="150" r="118" fill="#A24E2E" fill-opacity="0.05"/>

  <!-- flames rising between the bars -->
  <path d="M170 150 C160 128 178 122 172 104 C188 116 192 134 188 150 Z" fill="#E08A4A" fill-opacity="0.16"/>
  <path d="M170 150 C160 128 178 122 172 104 C188 116 192 134 188 150" fill="none" stroke="#E08A4A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M204 148 C190 120 214 110 206 86 C228 106 230 130 224 148 Z" fill="#C7693B" fill-opacity="0.16"/>
  <path d="M204 148 C190 120 214 110 206 86 C228 106 230 130 224 148" fill="none" stroke="#C7693B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M236 150 C228 132 242 126 238 110 C252 122 254 138 250 150 Z" fill="#E08A4A" fill-opacity="0.16"/>
  <path d="M236 150 C228 132 242 126 238 110 C252 122 254 138 250 150" fill="none" stroke="#E08A4A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- grill body -->
  <rect x="112" y="148" width="176" height="56" rx="26" fill="#A24E2E" fill-opacity="0.08"/>
  <rect x="112" y="148" width="176" height="56" rx="26" fill="none" stroke="#A24E2E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- grate bars -->
  <line x1="128" y1="166" x2="272" y2="166" stroke="#A24E2E" stroke-width="6" stroke-linecap="round"/>
  <line x1="124" y1="178" x2="276" y2="178" stroke="#A24E2E" stroke-width="6" stroke-linecap="round"/>
  <line x1="128" y1="190" x2="272" y2="190" stroke="#A24E2E" stroke-width="6" stroke-linecap="round"/>

  <!-- legs -->
  <line x1="146" y1="204" x2="136" y2="220" stroke="#A24E2E" stroke-width="6" stroke-linecap="round"/>
  <line x1="254" y1="204" x2="264" y2="220" stroke="#A24E2E" stroke-width="6" stroke-linecap="round"/>
</svg>
