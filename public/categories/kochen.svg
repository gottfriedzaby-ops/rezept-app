  <path d="M252 168 Q264 168 264 176" fill="none" stroke="#2D5F3F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lid -->
  <path d="M142 162 L258 162" fill="none" stroke="#2D5F3F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M150 162 Q150 150 200 150 Q250 150 250 162" fill="#2D5F3F" fill-opacity="0.08" stroke="#2D5F3F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lid knob -->
  <path d="M200 150 L200 142" fill="none" stroke="#2D5F3F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="200" cy="138" r="5" fill="#2D5F3F"/>

  <!-- Steam curls -->
  <path d="M176 132 Q166 120 176 108 Q186 98 178 96" fill="none" stroke="#6E9A7E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M200 130 Q190 116 200 102 Q210 90 202 86" fill="none" stroke="#6E9A7E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M224 132 Q234 120 224 108 Q214 98 222 96" fill="none" stroke="#6E9A7E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
