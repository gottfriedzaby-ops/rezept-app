name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Works without real env vars: Supabase clients are lazy proxies and all
      # data pages are force-dynamic (see lib/supabase.ts).
      - name: Build
        run: npm run build
