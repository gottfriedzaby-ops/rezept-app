<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Kochen">
  <defs>
    <linearGradient id="bg-kochen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4EDE7"/>
      <stop offset="1" stop-color="#CBDDD0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg-kochen)"/>

  <!-- Pot body: wide with gently rounded bottom -->
  <path d="M148 162 L148 188 Q148 205 168 205 L232 205 Q252 205 252 188 L252 162 Z" fill="#2D5F3F" fill-opacity="0.08" stroke="#2D5F3F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

